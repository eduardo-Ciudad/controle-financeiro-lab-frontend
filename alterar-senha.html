            <main class="main-content" id="mainContent">
                <div class="card" style="max-width: 480px;">
                    <div class="card-header">
                        <h3>Alterar Senha</h3>
                    </div>
                    <div class="card-body">
                        <form id="alterarSenhaForm" novalidate>
                            <div class="form-group">
                                <label class="form-label" for="senhaAtual">Senha atual</label>
                                <input class="form-input" type="password" id="senhaAtual" name="senhaAtual"
                                    placeholder="••••••••" required autocomplete="current-password">
                                <span class="form-error" id="senhaAtualError"></span>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="novaSenha">Nova senha</label>
                                <input class="form-input" type="password" id="novaSenha" name="novaSenha"
                                    placeholder="••••••••" required autocomplete="new-password" minlength="6">
                                <span class="form-error" id="novaSenhaError"></span>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="confirmarNovaSenha">Confirmar nova senha</label>
                                <input class="form-input" type="password" id="confirmarNovaSenha" name="confirmarNovaSenha"
                                    placeholder="••••••••" required autocomplete="new-password" minlength="6">
                                <span class="form-error" id="confirmarNovaSenhaError"></span>
                            </div>

                            <div class="form-error-general hidden" id="alterarSenhaError"></div>

                            <button type="submit" class="btn btn-primary mt-md" id="alterarSenhaBtn">
                                <span class="btn-text">Solicitar alteração</span>
                                <span class="btn-spinner hidden">
                                    <span class="spinner spinner-sm"></span>
                                </span>
                            </button>

                            <p class="form-hint mt-md">Após a solicitação, um email de confirmação será enviado para validar a alteração.</p>
                        </form>
                    </div>
                </div>
            </main>

            <footer class="app-footer legal-links">
                <a href="termos-de-uso.html">Termos de Uso</a>
                <span class="legal-links__sep">·</span>

                <span class="legal-links__sep">·</span>
                <a href="politica-de-cookies.html">Política de Cookies</a>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/router.js"></script>
    <script>
        requireAuth();

        document.getElementById('alterarSenhaForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var btn = document.getElementById('alterarSenhaBtn');
            var alterarSenhaError = document.getElementById('alterarSenhaError');

            clearFormErrors();
            alterarSenhaError.classList.add('hidden');

            var senhaAtualInput = document.getElementById('senhaAtual');
            var novaSenhaInput = document.getElementById('novaSenha');
            var confirmarInput = document.getElementById('confirmarNovaSenha');

            var senhaAtual = senhaAtualInput.value;
            var novaSenha = novaSenhaInput.value;
            var confirmarNovaSenha = confirmarInput.value;

            if (!senhaAtual) {
                document.getElementById('senhaAtualError').textContent = 'Informe sua senha atual.';
                senhaAtualInput.classList.add('input-error');
                return;
            }

            if (novaSenha.length < 6) {
                document.getElementById('novaSenhaError').textContent = 'A nova senha deve ter no mínimo 6 caracteres.';
                novaSenhaInput.classList.add('input-error');
                return;
            }

            if (novaSenha !== confirmarNovaSenha) {
                document.getElementById('confirmarNovaSenhaError').textContent = 'As senhas não coincidem.';
                confirmarInput.classList.add('input-error');
                return;
            }

            setButtonLoading(btn, true);

            try {
                var data = await api.post('/auth/alterar-senha', { senhaAtual: senhaAtual, novaSenha: novaSenha });
                showToast(data.message || 'Email de confirmação enviado. Verifique sua caixa de entrada.', 'success');
                document.getElementById('alterarSenhaForm').reset();
            } catch (err) {
                if (err.fieldErrors && Array.isArray(err.fieldErrors)) {
                    handleApiError(err);
                } else {
                    alterarSenhaError.textContent = err.message || err.erro || 'Não foi possível solicitar a alteração de senha.';
                    alterarSenhaError.classList.remove('hidden');
                }
            } finally {
                setButtonLoading(btn, false);
            }
        });
    </script>
    <script src="js/cookie-consent.js"></script>
